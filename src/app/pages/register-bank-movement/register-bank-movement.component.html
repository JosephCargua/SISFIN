<div class="register-container">
  <section class="card form-section">
    <div class="section-title">Datos Generales</div>
    <div class="form-grid">
      
      <div class="form-row">
        <label>Tipo de Movimiento:</label>
        <div class="input-group">
          <select [(ngModel)]="movement.tipoMovimiento" style="width: 150px;">
            <option value="Egreso">Egreso</option>
            <option value="Ingreso">Ingreso</option>
          </select>
          <select [(ngModel)]="movement.metodo" style="width: 150px; margin-left: 8px;">
            <option value="Cheque">Cheque</option>
            <option value="Depósito">Depósito</option>
            <option value="Transferencia">Transferencia</option>
          </select>
        </div>
        <div class="checkbox-group" style="margin-left: auto;">
          <input type="checkbox" [(ngModel)]="movement.anulado" id="anulado" />
          <label for="anulado" style="width: auto; text-align: left; padding-left: 4px;">Anulado</label>
        </div>
      </div>

      <div class="form-row">
        <label>Fecha de Emisión:</label>
        <input type="date" [(ngModel)]="movement.fechaEmision" style="width: 200px;" />
      </div>

      <div class="form-row">
        <label class="required">Cuenta Bancaria:</label>
        <div class="input-with-icon" style="max-width: 400px;">
          <input type="text" [(ngModel)]="movement.cuentaBancaria" placeholder="..." readonly />
          <span class="material-icons" style="cursor: pointer;" (click)="openAccountModal('main')">search</span>
        </div>
      </div>

      <div class="form-row">
        <label class="required">Persona:</label>
        <div class="input-with-icon" style="max-width: 400px;">
          <input type="text" [(ngModel)]="movement.persona" placeholder="..." />
          <span class="material-icons">search</span>
        </div>
      </div>

      <div class="form-row">
        <label class="required">Páguese a la orden de:</label>
        <input type="text" [(ngModel)]="movement.paguese" style="max-width: 400px;" />
      </div>

      <div class="form-row">
        <label>Número de Cheque:</label>
        <input type="text" [(ngModel)]="movement.numeroCheque" style="max-width: 400px;" />
      </div>

      <div class="form-row">
        <label>Fecha del cheque:</label>
        <input type="date" [(ngModel)]="movement.fechaCheque" style="width: 200px;" />
      </div>

      <div class="form-row" style="align-items: flex-start;">
        <label class="required" style="margin-top: 6px;">Descripción:</label>
        <textarea [(ngModel)]="movement.descripcion" rows="4" style="max-width: 600px; width: 100%;"></textarea>
      </div>

    </div>
  </section>

  <section class="card detail-section">
    <div class="tabs">
      <div class="tab active">Cuentas</div>
    </div>
    
    <div class="tab-content">
      <div class="table-scroll">
        <table class="detail-table">
          <thead>
            <tr>
              <th style="width: 40px; text-align: center;"></th>
              <th>Cuenta</th>
              <th style="text-align: right; width: 150px;">Monto</th>
              <th>Centro de Costo</th>
              <th>Proyecto</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let det of accountsDetails; let i = index">
              <td style="text-align: center;">
                <button class="btn-icon btn-delete" (click)="removeDetail(i)">
                  <span class="material-icons">delete</span>
                </button>
              </td>
              <td>
                <div class="input-with-icon">
                  <input type="text" [(ngModel)]="det.cuenta" placeholder="..." readonly />
                  <span class="material-icons" style="cursor: pointer;" (click)="openAccountModal('detail', i)">search</span>
                </div>
              </td>
              <td>
                <input type="number" [(ngModel)]="det.monto" style="width: 100%; text-align: right;" />
              </td>
              <td>
                <div class="input-with-icon">
                  <input type="text" [(ngModel)]="det.centroCosto" placeholder="..." />
                  <span class="material-icons">search</span>
                </div>
              </td>
              <td>
                <div class="input-with-icon">
                  <input type="text" [(ngModel)]="det.proyecto" placeholder="..." />
                  <span class="material-icons">search</span>
                </div>
              </td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="2"></td>
              <td style="text-align: right; font-weight: 500; padding: 12px; background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                {{ formatCurrency(getTotal()) }}
              </td>
              <td colspan="2"></td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div style="margin-top: 16px;">
        <button class="btn btn-primary btn-add-detail" (click)="addDetail()">
          <span class="material-icons">add</span> Agregar detalle
        </button>
      </div>
    </div>
  </section>

  <!-- Botones de Acción -->
  <div class="action-buttons-footer" style="display: flex; justify-content: flex-end; gap: 16px; margin-top: 24px; padding-bottom: 32px;">
    <button class="btn-cancel" (click)="cancel()">
      <span class="material-icons">close</span> Cancelar
    </button>
    <button class="btn-primary" (click)="save()">
      <span class="material-icons">save</span> Guardar
    </button>
  </div>
</div>

<app-account-selector-modal 
  [isVisible]="isAccountModalVisible" 
  (close)="isAccountModalVisible = false"
  (accountSelected)="onAccountSelected($event)">
</app-account-selector-modal>
