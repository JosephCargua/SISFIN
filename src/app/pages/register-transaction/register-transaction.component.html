<div class="register-container">
  <section class="card form-section">
    <div class="section-title">Información de la Transacción</div>
    <div class="form-grid">
      
      <div class="form-row">
        <label>Tipo de Transacción:</label>
        <select [(ngModel)]="movement.tipoMovimiento" style="width: 250px;">
          <option value="Cobro">Cobro</option>
          <option value="Pago">Pago</option>
          <option value="Ingreso">Ingreso</option>
          <option value="Egreso">Egreso</option>
        </select>
      </div>

      <div class="form-row">
        <label>Forma de Cobro:</label>
        <select [(ngModel)]="movement.metodo" style="width: 250px;">
          <option value="Caja">Caja</option>
          <option value="Banco">Banco</option>
          <option value="Transacción">Transacción</option>
        </select>
      </div>

      <div class="form-row">
        <label>Fecha de Emisión:</label>
        <input type="date" [(ngModel)]="movement.fechaEmision" style="width: 200px;" />
      </div>

      <div class="form-row">
        <label class="required">Persona:</label>
        <div class="input-with-icon" style="max-width: 400px;">
          <input type="text" [(ngModel)]="movement.persona" placeholder="..." />
          <span class="material-icons">search</span>
        </div>
      </div>

      <div class="form-row">
        <label class="required">Cuenta Pago/Cobro:</label>
        <div class="input-with-icon" style="max-width: 400px;">
          <input type="text" [(ngModel)]="movement.cuentaBancaria" placeholder="..." />
          <span class="material-icons">search</span>
        </div>
      </div>

      <div class="form-row">
        <label># de Comprobante:</label>
        <input type="text" [(ngModel)]="movement.numeroComprobante" style="width: 250px;" />
        <div class="checkbox-group" style="margin-left: 16px;">
          <input type="checkbox" [(ngModel)]="movement.esEfectivo" id="efectivo" />
          <label for="efectivo" style="width: auto; padding-left: 4px;">EFECTIVO</label>
        </div>
      </div>

      <div class="form-row" style="align-items: flex-start;">
        <label style="margin-top: 6px;">Descripción:</label>
        <textarea [(ngModel)]="movement.descripcion" rows="4" style="max-width: 600px; width: 100%;"></textarea>
      </div>

    </div>
  </section>

  <section class="card detail-section">
    <div class="tabs">
      <div class="tab active">Documentos</div>
    </div>
    
    <div class="tab-content">
      <div class="table-scroll">
        <table class="detail-table">
          <thead>
            <tr>
              <th style="width: 40px; text-align: center;"></th>
              <th>Documento</th>
              <th style="width: 120px;">Fecha Emisión</th>
              <th style="width: 140px;">Tipo Documento</th>
              <th style="text-align: right; width: 120px;">Valor</th>
              <th style="text-align: right; width: 120px;">Saldo</th>
              <th style="text-align: right; width: 150px;">Valor a cobrar</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let doc of documentsDetails; let i = index">
              <td style="text-align: center;">
                <button class="btn-icon btn-delete" (click)="removeDetail(i)">
                  <span class="material-icons">delete</span>
                </button>
              </td>
              <td>
                <input type="text" [(ngModel)]="doc.documento" style="width: 100%;" />
              </td>
              <td>
                <input type="date" [(ngModel)]="doc.fechaEmision" style="width: 100%;" />
              </td>
              <td>
                <input type="text" [(ngModel)]="doc.tipoDocumento" style="width: 100%;" />
              </td>
              <td>
                <input type="number" [(ngModel)]="doc.valor" style="width: 100%; text-align: right;" />
              </td>
              <td>
                <input type="number" [(ngModel)]="doc.saldo" style="width: 100%; text-align: right;" />
              </td>
              <td>
                <input type="number" [(ngModel)]="doc.valorCobrar" style="width: 100%; text-align: right;" />
              </td>
            </tr>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="5"></td>
              <td style="text-align: right; padding: 12px; font-weight: bold;">Total:</td>
              <td style="text-align: right; font-weight: bold; padding: 12px; background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                {{ formatCurrency(getTotal()) }}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div style="margin-top: 16px;">
        <button class="btn btn-primary btn-add-detail" (click)="addDetail()">
          <span class="material-icons">add_circle</span> Agregar Detalle
        </button>
      </div>
    </div>
  </section>

  <!-- Botones de Acción -->
  <div class="action-buttons-footer" style="display: flex; justify-content: flex-end; gap: 16px; margin-top: 24px; padding-bottom: 32px;">
    <button class="btn-cancel" (click)="cancel()">
      <span class="material-icons">close</span> Cancelar
    </button>
    <button class="btn-primary" (click)="save()">
      <span class="material-icons">save</span> Guardar
    </button>
  </div>
</div>
