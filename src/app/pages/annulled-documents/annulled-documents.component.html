<div class="annulled-documents-container" style="padding: 16px; background-color: #f8fafc; min-height: 100vh;">
  <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
    <div style="display: flex; align-items: center; gap: 12px;">
      <h1 style="margin: 0; font-size: 20px; color: #1e293b;">Consultar Documentos Anulados</h1>
    </div>
    <div style="display: flex; gap: 8px;">
      <button type="button" class="btn btn-primary" style="background-color: #0ea5e9; border: none; color: white; border-radius: 4px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <span class="material-icons" style="font-size: 18px;">add</span>
      </button>
      <button type="button" class="btn btn-secondary" style="background-color: white; border: 1px solid #cbd5e1; color: #0ea5e9; border-radius: 4px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
        <span class="material-icons" style="font-size: 18px;">description</span>
      </button>
    </div>
  </div>

  <section class="card search-section" style="background: white; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 16px; overflow: hidden;">
    <div style="padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; color: #0ea5e9; font-weight: 500; font-size: 14px;">
      <span class="material-icons" style="margin-right: 8px; font-size: 18px;">expand_more</span> Búsqueda
    </div>
    <div style="padding: 16px;">
      <div class="form-grid" style="display: grid; grid-template-columns: 140px 1fr 140px 1fr; gap: 12px 24px; align-items: center; max-width: 1000px; margin-bottom: 16px;">
        
        <label style="text-align: right; color: #64748b; font-size: 13px;"># Documento:</label>
        <input type="text" [(ngModel)]="filters.documentNumber" style="padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%;" />

        <label style="text-align: right; color: #64748b; font-size: 13px;">Desde:</label>
        <input type="date" [(ngModel)]="filters.dateFrom" style="padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%;" />

        <label style="text-align: right; color: #64748b; font-size: 13px;"># Autorización:</label>
        <input type="text" [(ngModel)]="filters.authNumber" style="padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%;" />

        <label style="text-align: right; color: #64748b; font-size: 13px;">Hasta:</label>
        <input type="date" [(ngModel)]="filters.dateTo" style="padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%;" />

        <label style="text-align: right; color: #64748b; font-size: 13px;">Tipo Documento:</label>
        <select [(ngModel)]="filters.documentType" style="padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; width: 100%;">
          <option value="Todos">Todos</option>
          <option value="Factura">Factura</option>
          <option value="Retención">Retención</option>
        </select>
        <div></div>
        <div></div>
      </div>

      <button type="button" class="btn btn-primary" (click)="search()" style="background-color: #0ea5e9; border: none; color: white; padding: 6px 16px; border-radius: 4px; display: inline-flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer;">
        <span class="material-icons" style="font-size: 16px;">search</span> Consultar
      </button>
    </div>
  </section>

  <section class="card table-section" style="background: white; border: 1px solid #e2e8f0; border-radius: 8px;">
    <div class="table-scroll" style="overflow-x: auto;">
      <table style="width: 100%; border-collapse: collapse; min-width: 800px; font-size: 13px;">
        <thead>
          <tr style="background-color: #f1f5f9; text-align: left; color: #475569;">
            <th style="padding: 8px; border: 1px solid #e2e8f0; width: 40px; text-align: center;"></th>
            <th style="padding: 8px; border: 1px solid #e2e8f0; font-weight: 500;">Fecha Anulación</th>
            <th style="padding: 8px; border: 1px solid #e2e8f0; font-weight: 500;">Tipo de Documento</th>
            <th style="padding: 8px; border: 1px solid #e2e8f0; font-weight: 500;"># Documento</th>
            <th style="padding: 8px; border: 1px solid #e2e8f0; font-weight: 500;">Autorización</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="documents.length === 0">
            <td colspan="5" style="padding: 16px; text-align: center; color: #64748b;">No se encontraron documentos anulados</td>
          </tr>
          <tr *ngFor="let doc of documents" style="border-bottom: 1px solid #e2e8f0;">
            <td style="padding: 8px; text-align: center; border-right: 1px solid #e2e8f0;">
              <button type="button" style="background: white; border: 1px solid #e2e8f0; border-radius: 4px; padding: 4px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;">
                <span class="material-icons" style="font-size: 14px; color: #0ea5e9;">delete</span>
              </button>
            </td>
            <td style="padding: 8px; border-right: 1px solid #e2e8f0; color: #334155;">{{ doc.annulledDate }}</td>
            <td style="padding: 8px; border-right: 1px solid #e2e8f0; color: #334155;">{{ doc.documentType }}</td>
            <td style="padding: 8px; border-right: 1px solid #e2e8f0;">
              <div style="color: #334155;">{{ doc.documentNumber }}</div>
              <div style="color: #0ea5e9; font-size: 11px;">{{ doc.direction }}</div>
            </td>
            <td style="padding: 8px; color: #334155;">{{ doc.authorization }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
